<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: #fff;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 30px 25px;
        text-align: center;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 1.5s ease;
    }

    h1 {
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        margin-bottom: 15px;
        animation: floatText 3s ease-in-out infinite;
    }

    p {
        font-size: clamp(1rem, 3vw, 1.2rem);
        line-height: 1.7;
        color: #f1f1f1;
    }

    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 30px;
        background: #ffffff;
        color: #5a4fcf;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        transform: scale(1.05);
        background: #e6e6ff;
    }

    /* Hearts */
    .heart {
        position: absolute;
        width: 15px;
        height: 15px;
        background: #ff6b81;
        transform: rotate(45deg);
        animation: floatUp linear infinite;
        opacity: 0.8;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 15px;
        height: 15px;
        background: #ff6b81;
        border-radius: 50%;
    }

    .heart::before {
        top: -7px;
        left: 0;
    }

    .heart::after {
        left: -7px;
        top: 0;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(100vh) rotate(45deg);
            opacity: 0.8;
        }
        100% {
            transform: translateY(-10vh) rotate(45deg);
            opacity: 0;
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes floatText {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
        .card {
            padding: 25px 18px;
        }
    }
</style>
</head>

<body>

<div class="card">
    <h1>I'm Really Sorry ❤️</h1>
    <p>
        I won’t do it again. <br>
        I’ll truly try my best to make you happy. <br>
        You mean a lot to me, and I’ll always care. 💕
    </p>

    <button onclick="showMessage()">One More Chance? 🥺</button>
</div>

<script>
    function showMessage() {
        alert("I truly mean it ❤️ I'll make you happy!");
    }

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 4) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 500);
</script>

</body>
</html>
